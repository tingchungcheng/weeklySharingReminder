AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Weekly sharing roster — HTTP API, Lambda, DynamoDB (SAM).

Parameters:
  CognitoDomainPrefix:
    Type: String
    Description: Unique prefix for Cognito Hosted UI domain.
    Default: weekly-sharing-reminder-auth
  AuthCallbackUrl:
    Type: String
    Description: Callback URL after login/signup (e.g. Amplify site URL or local http://localhost:8080/).
    Default: http://localhost:8080/
  AuthLogoutUrl:
    Type: String
    Description: Redirect URL after logout.
    Default: http://localhost:8080/

Globals:
  Function:
    Timeout: 10
    Runtime: nodejs20.x
    MemorySize: 128
    Architectures:
      - x86_64

Resources:
  # CORS is returned from Lambdas + explicit OPTIONS routes. API-level CorsConfiguration
  # was emitting OPTIONS 204 without Access-Control-* on /roster, breaking PUT preflight.
  WeeklySharingHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${WeeklySharingUserPool}
              audience:
                - !Ref WeeklySharingUserPoolClient

  WeeklySharingUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: weekly-sharing-reminder-users
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false

  WeeklySharingUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref WeeklySharingUserPool
      ClientName: weekly-sharing-reminder-web
      GenerateSecret: false
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - implicit
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Ref AuthCallbackUrl
      LogoutURLs:
        - !Ref AuthLogoutUrl
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  WeeklySharingUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CognitoDomainPrefix
      UserPoolId: !Ref WeeklySharingUserPool

  WeeklySharingAdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      Description: Can edit the roster.
      UserPoolId: !Ref WeeklySharingUserPool

  RosterTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH

  ListNamesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      CodeUri: handlers/list-names/
      Environment:
        Variables:
          TABLE_NAME: !Ref RosterTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RosterTable
      Events:
        GetNames:
          Type: HttpApi
          Properties:
            ApiId: !Ref WeeklySharingHttpApi
            Path: /names
            Method: GET
        GetNamesOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref WeeklySharingHttpApi
            Path: /names
            Method: OPTIONS

  PutRosterFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      CodeUri: handlers/put-roster/
      Environment:
        Variables:
          TABLE_NAME: !Ref RosterTable
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref RosterTable
      Events:
        PutRoster:
          Type: HttpApi
          Properties:
            ApiId: !Ref WeeklySharingHttpApi
            Path: /roster
            Method: PUT
            Auth:
              Authorizer: CognitoJwtAuthorizer
        PutRosterOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref WeeklySharingHttpApi
            Path: /roster
            Method: OPTIONS

Outputs:
  HttpApiEndpoint:
    Description: Base URL — `${HttpApiEndpoint}/names` and PUT `${HttpApiEndpoint}/roster`
    Value: !GetAtt WeeklySharingHttpApi.ApiEndpoint
  HttpApiId:
    Description: HTTP API ID
    Value: !Ref WeeklySharingHttpApi
  RosterTableName:
    Description: DynamoDB table — seed pk=ROSTER (see sam/scripts/seed-roster.sh).
    Value: !Ref RosterTable
  ListNamesFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt ListNamesFunction.Arn
  PutRosterFunctionArn:
    Description: Lambda PUT /roster
    Value: !GetAtt PutRosterFunction.Arn
  CognitoUserPoolId:
    Description: Cognito user pool ID
    Value: !Ref WeeklySharingUserPool
  CognitoUserPoolClientId:
    Description: Cognito app client ID for web auth
    Value: !Ref WeeklySharingUserPoolClient
  CognitoHostedUiDomain:
    Description: Cognito hosted UI domain URL
    Value: !Sub https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com
  CognitoAdminGroup:
    Description: Group required for roster edit
    Value: admin
