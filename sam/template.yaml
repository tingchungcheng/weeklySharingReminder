AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Weekly sharing roster — HTTP API, Lambda, DynamoDB (SAM).

Parameters:
  EditRosterSecret:
    Type: String
    Description: Secret for PUT /roster — browser sends header X-Edit-Key with this value. Use a long random string (min 8 chars).
    Default: ""
    NoEcho: true

Globals:
  Function:
    Timeout: 10
    Runtime: nodejs20.x
    MemorySize: 128
    Architectures:
      - x86_64

Resources:
  # CORS is returned from Lambdas + explicit OPTIONS routes. API-level CorsConfiguration
  # was emitting OPTIONS 204 without Access-Control-* on /roster, breaking PUT preflight.
  WeeklySharingHttpApi:
    Type: AWS::Serverless::HttpApi

  RosterTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH

  ListNamesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      CodeUri: handlers/list-names/
      Environment:
        Variables:
          TABLE_NAME: !Ref RosterTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RosterTable
      Events:
        GetNames:
          Type: HttpApi
          Properties:
            ApiId: !Ref WeeklySharingHttpApi
            Path: /names
            Method: GET
        GetNamesOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref WeeklySharingHttpApi
            Path: /names
            Method: OPTIONS

  PutRosterFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      CodeUri: handlers/put-roster/
      Environment:
        Variables:
          TABLE_NAME: !Ref RosterTable
          EDIT_ROSTER_SECRET: !Ref EditRosterSecret
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref RosterTable
      Events:
        PutRoster:
          Type: HttpApi
          Properties:
            ApiId: !Ref WeeklySharingHttpApi
            Path: /roster
            Method: PUT
        PutRosterOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref WeeklySharingHttpApi
            Path: /roster
            Method: OPTIONS

Outputs:
  HttpApiEndpoint:
    Description: Base URL — `${HttpApiEndpoint}/names` and PUT `${HttpApiEndpoint}/roster`
    Value: !GetAtt WeeklySharingHttpApi.ApiEndpoint
  HttpApiId:
    Description: HTTP API ID
    Value: !Ref WeeklySharingHttpApi
  RosterTableName:
    Description: DynamoDB table — seed pk=ROSTER (see sam/scripts/seed-roster.sh).
    Value: !Ref RosterTable
  ListNamesFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt ListNamesFunction.Arn
  PutRosterFunctionArn:
    Description: Lambda PUT /roster
    Value: !GetAtt PutRosterFunction.Arn
