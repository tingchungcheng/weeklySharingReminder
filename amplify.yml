version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "window.WEEKLY_SHARING_API_BASE = \"${API_BASE_URL}\";" > web/api-config.js
        - echo "window.WEEKLY_SHARING_COGNITO_DOMAIN = \"${COGNITO_DOMAIN}\";" >> web/api-config.js
        - echo "window.WEEKLY_SHARING_COGNITO_CLIENT_ID = \"${COGNITO_CLIENT_ID}\";" >> web/api-config.js
        - echo "window.WEEKLY_SHARING_COGNITO_REGION = \"${COGNITO_REGION}\";" >> web/api-config.js
        - echo "window.WEEKLY_SHARING_SERIES_ANCHOR_NAME = \"${SERIES_ANCHOR_NAME}\";" >> web/api-config.js
  artifacts:
    baseDirectory: web
    files:
      - "**/*"
